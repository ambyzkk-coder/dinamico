            background-position: center;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        .map-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .map-header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .filter-bar {
            background-color: #2c3e50;
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar button {
            padding: 10px 20px;
            background-color: #1abc9c;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-bar button:hover {
            background-color: #16a085;
            transform: scale(1.05);
        }

        .filter-bar button.active {
            background-color: #e74c3c;
        }

        .filter-bar input {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-size: 0.9rem;
            width: 250px;
            outline: none;
        }

        #map {
            width: 100%;
            height: 600px;
            z-index: 1;
        }

        .zoo-list {
            background-color: #f8f9fa;
            padding: 30px 20px;
        }

        .zoo-list h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }

        .zoo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .zoo-card {
            background-color: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .zoo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .zoo-card h3 {
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        .zoo-card .country {
            color: #1abc9c;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .zoo-card .type {
            display: inline-block;
            background-color: #e8f8f5;
            color: #1abc9c;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
            margin-bottom: 10px;
        }

        .zoo-card .btn-view {
            display: inline-block;
            background-color: #1abc9c;
            color: white;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            transition: background 0.3s;
        }

        .zoo-card .btn-view:hover {
            background-color: #16a085;
        }

            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 0.9rem;
        }

        .back-link {
            display: inline-block;
            margin: 20px;
            padding: 10px 20px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .back-link:hover {
            background-color: #1a252f;
        }

        .leaflet-popup-content h4 {
            margin: 0 0 5px 0;
            color: #2c3e50;
        }

        .leaflet-popup-content p {
            margin: 5px 0;
            color: #666;
            font-size: 0.9rem;
        }

        .leaflet-popup-content a {
            display: inline-block;
            background-color: #1abc9c;
            color: white;
            text-decoration: none;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .count-display {
            background-color: #e74c3c;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;

            {name: "Zoo Bojnice", country: "Slovacchia", region: "europa", lat: 48.7794, lng: 18.5942, type: "zoo", icon: zooIcon},
            {name: "Zoo Bratislava", country: "Slovacchia", region: "europa", lat: 48.1567, lng: 17.0944, type: "zoo", icon: zooIcon},

            // === RUSSIA ===
            {name: "Moscow Zoo", country: "Russia", region: "europa", lat: 55.7614, lng: 37.6183, type: "zoo", icon: zooIcon},
            {name: "Leningrad Zoo - San Pietroburgo", country: "Russia", region: "europa", lat: 59.9450, lng: 30.3031, type: "zoo", icon: zooIcon}
        ];

        var markers = [];
        var currentFilter = 'all';

        function addMarkers(filterType) {
            markers.forEach(function(m) { map.removeLayer(m); });
            markers = [];

            var filteredZoos = zoos.filter(function(zoo) {
                if (filterType === 'all') return true;
                if (filterType === 'europa') return zoo.region === 'europa';
                return zoo.country.toLowerCase().includes(filterType);
            });

            filteredZoos.forEach(function(zoo) {
                var marker = L.marker([zoo.lat, zoo.lng], {icon: zoo.icon})
                    .addTo(map)
                    .bindPopup(
                        '<h4>' + zoo.name + '</h4>' +
                        '<p><strong>' + zoo.country + '</strong></p>' +
                        '<p>Tipo: ' + zoo.type + '</p>' +
                        '<a href="https://www.google.com/maps/search/' + encodeURIComponent(zoo.name) + '" target="_blank">Apri in Google Maps</a>'
                    );
                markers.push(marker);
            });

            document.getElementById('zoo-count').textContent = filteredZoos.length + ' zoo visualizzati';
            updateZooGrid(filteredZoos);
        }

        function updateZooGrid(filteredZoos) {
            var grid = document.getElementById('zoo-grid');
            grid.innerHTML = '';

            filteredZoos.forEach(function(zoo) {
                var card = document.createElement('div');
                card.className = 'zoo-card';
                card.innerHTML = 
                    '<h3>' + zoo.name + '</h3>' +
                    '<div class="country">' + zoo.country + '</div>' +
                    '<span class="type">' + zoo.type + '</span><br>' +
                    '<a href="https://www.google.com/maps/search/' + encodeURIComponent(zoo.name) + '" target="_blank" class="btn-view">📍 Vedi mappa</a>';
                grid.appendChild(card);
            });
        }

        function filterZoos(filterType) {
            currentFilter = filterType;
            
            document.querySelectorAll('.filter-bar button').forEach(function(btn) {
                btn.classList.remove('active');
            });
            document.getElementById('btn-' + filterType).classList.add('active');

            addMarkers(filterType);

            if (filterType === 'italia') {
                map.setView([42.5, 12.5], 6);
            } else if (filterType === 'germania') {
                map.setView([51.0, 10.0], 6);
            } else if (filterType === 'francia') {
                map.setView([46.5, 2.0], 6);
            } else if (filterType === 'uk') {
                map.setView([54.0, -2.0], 6);
            } else if (filterType === 'spagna') {
                map.setView([40.0, -3.0], 6);
            } else if (filterType === 'europa') {
                map.setView([50.0, 10.0], 4);
            } else {
                map.setView([50.0, 10.0], 4);
            }
        }

        function searchZoos() {
            var query = document.getElementById('searchInput').value.toLowerCase();
            
            markers.forEach(function(m) { map.removeLayer(m); });
            markers = [];

            var filteredZoos = zoos.filter(function(zoo) {
                return zoo.name.toLowerCase().includes(query) || zoo.country.toLowerCase().includes(query);
            });

            filteredZoos.forEach(function(zoo) {
                var marker = L.marker([zoo.lat, zoo.lng], {icon: zoo.icon})
                    .addTo(map)
                    .bindPopup(
                        '<h4>' + zoo.name + '</h4>' +
                        '<p><strong>' + zoo.country + '</strong></p>' +
                        '<p>Tipo: ' + zoo.type + '</p>' +
                        '<a href="https://www.google.com/maps/search/' + encodeURIComponent(zoo.name) + '" target="_blank">Apri in Google Maps</a>'
                    );
                markers.push(marker);
            });

            document.getElementById('zoo-count').textContent = filteredZoos.length + ' zoo visualizzati';
            updateZooGrid(filteredZoos);

            if (filteredZoos.length === 1) {
                map.setView([filteredZoos[0].lat, filteredZoos[0].lng], 10);
            }
        }

        addMarkers('all');
    </script>
</body>
</html>
